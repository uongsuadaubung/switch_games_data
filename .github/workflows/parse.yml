name: Parse ZIP → games.json + Download Images

on:
  push:
    paths:
      - 'source/latest.zip'   # Trigger khi push file ZIP mới
  workflow_dispatch:           # Cho phép chạy thủ công từ GitHub UI

jobs:
  parse-and-download:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Cần quyền để commit ngược lại repo
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install Pillow

      - name: Parse ZIP → games.json
        run: python scripts/parse_zip.py source/latest.zip

      - name: Show parse result
        run: |
          echo "=== games.json (first 3 games) ==="
          python -c "
          import json
          games = json.load(open('data/games.json', encoding='utf-8'))
          for g in games[:3]:
              print(f'  - {g[\"name\"]} ({g[\"game_id\"]})')
          print(f'  ... total: {len(games)} games')
          "

      - name: Download images → images/{id}.jpg
        run: python scripts/download_images.py

      - name: Show image download result
        run: |
          echo "=== Images folder ==="
          ls images/ | wc -l | xargs -I{} echo "Total JPG files: {}"
          du -sh images/ | awk '{print "Total size: " $1}'

      - name: Commit & push updated data + images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Xoá ZIP khỏi Git index (file đã bị xoá bởi parse_zip.py)
          git rm --cached source/latest.zip 2>/dev/null || true
          git add data/games.json images/
          # Chỉ commit nếu có thay đổi thực sự
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "🎮 Update games data — $(python -c "import json; from datetime import datetime, timezone; games = json.load(open('data/games.json', encoding='utf-8')); print(f\"{len(games)} games @ {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}\")")"
          git push
